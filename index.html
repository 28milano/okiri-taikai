<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITAMAE大喜利</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #FFD600;
    --accent2: #FF4D4D;
    --text: #f0f0f0;
    --muted: #666;
    --border: #333;
    --gold: #FFD600;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.4;
  }

  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    background: var(--surface);
  }

  .logo {
    font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 4px;
  }

  .session-info {
    display: flex; align-items: center; gap: 14px;
    font-family: 'Space Mono', monospace; font-size: 0.82rem;
    color: var(--muted); flex-wrap: wrap;
  }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent2); color: white;
    padding: 4px 10px; border-radius: 100px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
    animation: pulse-badge 2s infinite;
  }
  .live-dot { width:7px; height:7px; background:white; border-radius:50%; animation:blink 1s infinite; }
  .conn-status { display:flex; align-items:center; gap:5px; font-size:0.75rem; }
  .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
  .conn-dot.online  { background:#4ade80; }
  .conn-dot.offline { background:var(--accent2); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes pulse-badge { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0.4)} 50%{box-shadow:0 0 0 6px rgba(255,77,77,0)} }

  /* お題バー */
  .topic-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .topic-label { font-size:0.72rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .topic-display { flex:1; font-size:1rem; font-weight:700; color:var(--text); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topic-display.empty { color:var(--muted); font-weight:400; font-style:italic; }
  .topic-edit-btn {
    background:none; border:1px solid var(--border); color:var(--muted);
    border-radius:7px; padding:5px 12px; cursor:pointer;
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.8rem; font-weight:700;
    transition:all 0.15s; white-space:nowrap;
  }
  .topic-edit-btn:hover { border-color:var(--accent); color:var(--accent); }
  .next-topic-btn {
    background:var(--accent2); border:none; color:white;
    border-radius:7px; padding:5px 14px; cursor:pointer;
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.8rem; font-weight:900;
    transition:all 0.15s; white-space:nowrap;
  }
  .next-topic-btn:hover { background:#ff6666; }
  .next-topic-btn.confirm { background:#cc0000; animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

  /* メインレイアウト */
  .main {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 0;
    min-height: calc(100vh - 118px);
  }

  .players-section {
    padding: 24px 28px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }

  .section-title { font-size:0.75rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }

  .add-player-btn {
    display:flex; align-items:center; gap:6px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:7px 14px; border-radius:8px;
    cursor:pointer; font-family:'Zen Maru Gothic',sans-serif;
    font-size:0.85rem; font-weight:700; transition:all 0.15s;
  }
  .add-player-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .player-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:18px 16px 14px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    position:relative; transition:all 0.2s;
  }
  .player-card.bumped { animation:bump 0.35s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes bump {
    0%  { transform:scale(1); }
    30% { transform:scale(1.06); background:#1e1e00; border-color:var(--accent); }
    60% { transform:scale(0.98); }
    100%{ transform:scale(1); }
  }

  .rank-badge {
    position:absolute; top:-10px; left:12px;
    width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:0.7rem; font-weight:700;
    border:2px solid var(--bg);
  }
  .rank-1    { background:var(--gold);    color:#000; }
  .rank-2    { background:var(--silver);  color:#000; }
  .rank-3    { background:var(--bronze);  color:#fff; }
  .rank-other{ background:var(--surface2); color:var(--muted); }

  .player-avatar { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; }
  .player-name   { font-size:0.9rem; font-weight:700; text-align:center; line-height:1.2; word-break:break-all; }
  .player-score  { font-family:'Space Mono',monospace; font-size:2.2rem; font-weight:700; line-height:1; color:var(--accent); }

  .vote-btn {
    width:100%; padding:10px; border-radius:10px; border:none;
    background:var(--accent); color:#000;
    font-family:'Zen Maru Gothic',sans-serif; font-size:1.1rem; font-weight:900;
    cursor:pointer; transition:all 0.1s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .vote-btn:hover  { background:#ffe033; transform:translateY(-1px); box-shadow:0 4px 12px rgba(255,214,0,0.3); }
  .vote-btn:active { transform:translateY(1px); box-shadow:none; }

  .delete-player-btn {
    position:absolute; top:6px; right:8px;
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:0.85rem; opacity:0; transition:opacity 0.15s; padding:2px 4px;
  }
  .player-card:hover .delete-player-btn { opacity:1; }
  .delete-player-btn:hover { color:var(--accent2); }

  /* 右サイドバー */
  .ranking-section {
    padding:0; background:var(--surface);
    display:flex; flex-direction:column; overflow:hidden;
  }

  .tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab-btn {
    flex:1; padding:13px 6px;
    background:none; border:none; color:var(--muted);
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.8rem; font-weight:700;
    cursor:pointer; transition:all 0.15s; border-bottom:2px solid transparent;
  }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-btn:hover:not(.active) { color:var(--text); }

  .tab-content { display:none; flex-direction:column; gap:14px; padding:18px; flex:1; overflow-y:auto; }
  .tab-content.active { display:flex; }

  .total-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .total-label { font-size:0.78rem; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
  .total-count { font-family:'Space Mono',monospace; font-size:1.3rem; font-weight:700; }

  .ranking-list { display:flex; flex-direction:column; gap:7px; flex:1; }

  .ranking-row {
    display:flex; align-items:center; gap:12px;
    padding:10px 13px; background:var(--surface2);
    border-radius:12px; border:1px solid var(--border);
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ranking-row.rank-1-row { border-color:rgba(255,214,0,0.4); background:rgba(255,214,0,0.07); }
  .ranking-row.rank-2-row { border-color:rgba(192,192,192,0.3); }
  .ranking-row.rank-3-row { border-color:rgba(205,127,50,0.3); }

  .ranking-num { font-family:'Space Mono',monospace; font-size:0.8rem; color:var(--muted); width:22px; text-align:center; flex-shrink:0; }
  .ranking-num.gold   { color:var(--gold);   font-weight:700; font-size:1rem; }
  .ranking-num.silver { color:var(--silver); font-weight:700; font-size:1rem; }
  .ranking-num.bronze { color:var(--bronze); font-weight:700; font-size:1rem; }
  .ranking-emoji  { font-size:1.2rem; flex-shrink:0; }
  .ranking-name   { flex:1; font-weight:700; font-size:0.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ranking-score  { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; color:var(--accent); flex-shrink:0; }
  .ranking-inner  { flex:1; min-width:0; }
  .bar-wrap { height:3px; background:var(--border); border-radius:100px; margin-top:4px; width:100%; position:relative; }
  .bar-fill { position:absolute; left:0; top:0; height:100%; background:var(--accent); border-radius:100px; transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .rank-1-row .bar-fill { background:var(--gold); }

  /* 結果発表・全リセットボタン */
  .action-btns { display:flex; flex-direction:column; gap:8px; flex-shrink:0; }

  .result-btn {
    width:100%; padding:11px; border-radius:10px;
    border:none; background:var(--accent); color:#000;
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.9rem; font-weight:900;
    cursor:pointer; transition:all 0.15s;
  }
  .result-btn:hover { background:#ffe033; }

  .full-reset-btn {
    width:100%; padding:9px; border-radius:10px;
    border:1px solid var(--border); background:none; color:var(--muted);
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.82rem; font-weight:700;
    cursor:pointer; transition:all 0.15s;
  }
  .full-reset-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .full-reset-btn.confirm { border-color:#cc0000; color:#cc0000; }

  /* 履歴タブ */
  .history-list { display:flex; flex-direction:column; gap:12px; }

  .history-card {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:14px;
  }

  .history-header {
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:8px; margin-bottom:10px;
  }
  .history-topic { font-size:0.88rem; font-weight:700; line-height:1.3; flex:1; }
  .history-num {
    font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--muted);
    background:var(--surface); border:1px solid var(--border);
    border-radius:5px; padding:2px 7px; flex-shrink:0;
  }

  .history-results { display:flex; flex-direction:column; gap:5px; }
  .history-row { display:flex; align-items:center; gap:8px; font-size:0.82rem; }
  .history-rank { width:22px; text-align:center; font-size:0.85rem; flex-shrink:0; }
  .history-name { flex:1; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .history-score { font-family:'Space Mono',monospace; font-weight:700; color:var(--accent); flex-shrink:0; }

  /* 結果発表モーダル */
  .result-modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    backdrop-filter:blur(6px); z-index:600;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .result-modal-overlay.show { opacity:1; pointer-events:all; }

  .result-modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:24px; padding:36px 32px; width:420px; max-width:92vw;
    max-height:85vh; overflow-y:auto;
    transform:scale(0.9) translateY(16px);
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-modal-overlay.show .result-modal { transform:scale(1) translateY(0); }

  .result-modal-header {
    text-align:center; margin-bottom:28px;
  }
  .result-modal-title {
    font-size:1.5rem; font-weight:900; margin-bottom:4px;
  }
  .result-modal-sub {
    font-size:0.82rem; color:var(--muted);
    font-family:'Space Mono',monospace;
  }

  .result-winner {
    background: linear-gradient(135deg, rgba(255,214,0,0.15), rgba(255,214,0,0.05));
    border:1px solid rgba(255,214,0,0.4);
    border-radius:16px; padding:20px;
    text-align:center; margin-bottom:20px;
  }
  .result-winner-emoji { font-size:2.5rem; margin-bottom:6px; }
  .result-winner-label { font-size:0.75rem; font-weight:700; letter-spacing:0.12em; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  .result-winner-name  { font-size:1.5rem; font-weight:900; }
  .result-winner-score { font-family:'Space Mono',monospace; font-size:1rem; color:var(--gold); margin-top:4px; }

  .result-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }

  .result-row {
    display:flex; align-items:center; gap:12px;
    padding:11px 14px; background:var(--surface2);
    border-radius:12px; border:1px solid var(--border);
  }
  .result-row.r1 { border-color:rgba(255,214,0,0.4); background:rgba(255,214,0,0.07); }
  .result-row.r2 { border-color:rgba(192,192,192,0.3); }
  .result-row.r3 { border-color:rgba(205,127,50,0.3); }

  .result-rank  { width:26px; text-align:center; font-size:1rem; flex-shrink:0; }
  .result-emoji { font-size:1.3rem; flex-shrink:0; }
  .result-name  { flex:1; font-weight:700; font-size:0.95rem; }
  .result-pts   { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; color:var(--accent); flex-shrink:0; }
  .result-pts-label { font-size:0.7rem; color:var(--muted); }

  .result-close-btn {
    width:100%; padding:12px; border-radius:12px;
    border:none; background:var(--surface2); color:var(--text);
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.9rem; font-weight:700;
    cursor:pointer; transition:all 0.15s;
  }
  .result-close-btn:hover { background:var(--border); }

  /* 通常モーダル */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(4px); z-index:500;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .modal-overlay.show { opacity:1; pointer-events:all; }

  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:32px; width:340px;
    transform:scale(0.92) translateY(10px);
    transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal { transform:scale(1) translateY(0); }
  .modal h2 { font-size:1.1rem; font-weight:900; margin-bottom:20px; }

  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:0.8rem; color:var(--muted); margin-bottom:6px; font-weight:700; letter-spacing:0.08em; }
  .modal-field input, .modal-field textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px; color:var(--text);
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.95rem;
    outline:none; transition:border-color 0.15s; resize:none;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color:var(--accent); }

  .emoji-picker { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .emoji-opt {
    aspect-ratio:1; border-radius:8px; border:2px solid transparent;
    background:var(--surface2); font-size:1.3rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all 0.12s;
  }
  .emoji-opt:hover { background:var(--border); }
  .emoji-opt.selected { border-color:var(--accent); background:rgba(255,214,0,0.1); }

  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel {
    flex:1; padding:10px; background:none; border:1px solid var(--border);
    color:var(--muted); border-radius:10px; cursor:pointer;
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; transition:all 0.15s;
  }
  .btn-cancel:hover { border-color:var(--text); color:var(--text); }
  .btn-add {
    flex:2; padding:10px; background:var(--accent); border:none; color:#000;
    border-radius:10px; cursor:pointer;
    font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:0.95rem; transition:all 0.15s;
  }
  .btn-add:hover { background:#ffe033; }

  .float-plus {
    position:fixed; font-family:'Space Mono',monospace;
    font-size:1.4rem; font-weight:700; color:var(--accent);
    pointer-events:none; z-index:900;
    animation:floatUp 0.9s ease-out forwards;
    text-shadow:0 2px 8px rgba(255,214,0,0.5);
  }
  @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(1.3);opacity:0} }

  .empty-state { color:var(--muted); font-size:0.88rem; text-align:center; padding:30px 16px; line-height:1.8; }

  /* ===== PC: 通常表示 ===== */
  @media (min-width:701px) {
    #mobile-view { display: none !important; }
  }

  /* ===== スマホ: 投票専用画面 ===== */
  @media (max-width:700px) {
    #pc-header, #pc-topic-bar, #pc-main,
    .result-modal-overlay, .modal-overlay { }

    #pc-header  { display: none !important; }
    #pc-topic-bar { display: none !important; }
    #pc-main    { display: none !important; }
    #mobile-view { display: flex !important; }

    #mobile-view {
      flex-direction: column;
      min-height: 100vh;
    }

    .mobile-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .mobile-logo {
      font-size: 1.3rem; font-weight: 900;
      display: flex; align-items: center; gap: 4px;
    }
    .mobile-live {
      display: flex; align-items: center; gap: 5px;
      background: var(--accent2); color: white;
      padding: 3px 9px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 700;
      animation: pulse-badge 2s infinite;
    }

    .mobile-topic {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    .mobile-topic-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
    }
    .mobile-topic-text {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
    }
    .mobile-topic-text.empty {
      color: var(--muted); font-weight: 400; font-style: italic; font-size: 0.9rem;
    }

    .mobile-players {
      flex: 1;
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }

    .mobile-player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
    }

    .mobile-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }

    .mobile-player-info { flex: 1; min-width: 0; }
    .mobile-player-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .mobile-player-score {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem; color: var(--accent);
    }

    .mobile-vote-btn {
      padding: 14px 20px; border-radius: 12px; border: none;
      background: var(--accent); color: #000;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.1rem; font-weight: 900; cursor: pointer;
      transition: all 0.1s; white-space: nowrap; flex-shrink: 0;
    }

</style>
</head>
<body>

<header id="pc-header">
  <div class="logo">
    <span style="color:#FF4D4D">ITAMAE</span><span style="color:white">大喜利</span>
  </div>
  <div class="session-info">

    <div class="conn-status">

      <span id="conn-label">接続中...</span>
    </div>
    <span id="total-votes-header">総投票: 0</span>
  </div>
</header>

<div class="topic-bar" id="pc-topic-bar">
  <span class="topic-label">お題</span>
  <div class="topic-display empty" id="topic-display">お題を設定してください</div>
  <button class="topic-edit-btn" onclick="openTopicModal()">✏️ お題を設定</button>
  <button class="next-topic-btn" id="next-topic-btn" onclick="nextTopic()">次のお題へ →</button>
</div>

<div class="main" id="pc-main">
  <section class="players-section">

    </div>
    <div class="players-grid" id="players-grid">

    </div>
  </section>

  <aside class="ranking-section">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('ranking', this)">🏆 ランキング</button>
      <button class="tab-btn" onclick="switchTab('history', this)">📋 お題履歴</button>
    </div>

    <div class="tab-content active" id="tab-ranking">
      <div class="total-box">
        <span class="total-label">TOTAL LAUGHS</span>

      </div>
      <div class="ranking-list" id="ranking-list">
        <div class="empty-state">まだ投票がありません</div>
      </div>
      <div class="action-btns">
        <button class="result-btn" onclick="showResult()">🎉 結果発表</button>
        <button class="full-reset-btn" id="full-reset-btn" onclick="fullReset()">🗑️ 全リセット（回答者・履歴すべて）</button>

    <div class="tab-content" id="tab-history">

        <div class="empty-state">「次のお題へ」を押すと<br>ここに結果が保存されます</div>
      </div>
    </div>
  </aside>
</div>

<!-- スマホ投票専用画面 -->
<div id="mobile-view" style="display:none">

  <!-- 参加登録画面（回答者用） -->
  <div id="mobile-join-screen" style="display:none">
    <div class="mobile-header">
      <div class="mobile-logo">
        <span style="color:#FF4D4D">ITAMAE</span><span style="color:white">大喜利</span>
      </div>
      <div class="mobile-live"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="mobile-join-body">
      <div class="mobile-join-title">参加登録</div>
      <div class="mobile-join-sub">名前と絵文字を選んで参加しよう！</div>
      <div class="mobile-field">
        <label>名前</label>
        <input type="text" id="mobile-name-input" placeholder="例: 田中さん" maxlength="20" />
      </div>
      <div class="mobile-field">
        <label>アイコン</label>
        <div class="mobile-emoji-picker" id="mobile-emoji-picker"></div>
      </div>
      <button class="mobile-join-btn" onclick="mobileJoin()">🙋 参加する</button>
      <button class="mobile-skip-btn" onclick="mobileSkip()">👀 登録せず投票だけする</button>
    </div>
  </div>

  <!-- 投票画面（回答者・観客共通） -->
  <div id="mobile-vote-screen" style="display:none; flex-direction:column; min-height:100vh;">
    <div class="mobile-header">
      <div class="mobile-logo">
        <span style="color:#FF4D4D">ITAMAE</span><span style="color:white">大喜利</span>
      </div>
      <div class="mobile-live"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="mobile-topic">
      <div class="mobile-topic-label">お題</div>
      <div class="mobile-topic-text empty" id="mobile-topic-text">お題を設定してください</div>
    </div>
    <div class="mobile-players" id="mobile-players"></div>
    <div class="mobile-footer">
      <div class="mobile-conn">
        <div class="conn-dot" id="mobile-conn-dot"></div>
        <span id="mobile-conn-label">接続中...</span>
      </div>
      <span id="mobile-total">総投票: 0</span>
    </div>
  </div>

</div>

<!-- 結果発表モーダル -->
<div class="result-modal-overlay" id="result-modal-overlay">
  <div class="result-modal">
    <div class="result-modal-header">
      <div class="result-modal-title">🏆 総合結果発表</div>
      <div class="result-modal-sub" id="result-modal-sub">全お題の合計スコア</div>
    </div>
    <div id="result-winner-box"></div>
    <div class="result-list" id="result-list"></div>
    <button class="result-close-btn" onclick="closeResult()">閉じる</button>
  </div>
</div>

<!-- 回答者追加モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>回答者を追加</h2>
    <div class="modal-field">
      <label>名前</label>
      <input type="text" id="player-name-input" placeholder="例: 田中さん" maxlength="20" />
    </div>
    <div class="modal-field">
      <label>アイコン</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" onclick="addPlayer()">追加する</button>
    </div>
  </div>
</div>

<!-- お題設定モーダル -->
<div class="modal-overlay" id="topic-modal-overlay">
  <div class="modal">
    <h2>✏️ お題を設定</h2>
    <div class="modal-field">
      <label>お題</label>
      <textarea id="topic-input" rows="3" placeholder="例: 眠れない夜にやること" maxlength="100"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTopicModal()">キャンセル</button>
      <button class="btn-add" onclick="saveTopic()">設定する</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEsn7ynywwO25mqE2DoKVvdWmzJZ0B72M",
  authDomain: "ookiri-taikai.firebaseapp.com",
  databaseURL: "https://ookiri-taikai-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ookiri-taikai",
  storageBucket: "ookiri-taikai.firebasestorage.app",
  messagingSenderId: "131854606021",
  appId: "1:131854606021:web:b9f20fe87788aa42f99aac"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const playersRef = ref(db, 'players');
const topicRef   = ref(db, 'currentTopic');
const historyRef = ref(db, 'history');

// 接続ステータス
onValue(ref(db, '.info/connected'), snap => {
  const online = snap.val();
  document.getElementById('conn-dot').className = 'conn-dot ' + (online ? 'online' : 'offline');
  document.getElementById('conn-label').textContent = online ? 'リアルタイム同期中' : 'オフライン';
});

const EMOJIS = ['😂','🤣','😎','🦊','🐸','🐧','🦁','🐯','🐻','🐼','🐨','🦄','🐙','🦋','🍣','🍜','🍕','🎭','🎪','🎯','⚡','🌟','💥','🔥','🎲','🤖'];
let players = {};
let currentTopic = '';
let history = {};
let selectedEmoji = EMOJIS[0];

// Emoji picker
const picker = document.getElementById('emoji-picker');
EMOJIS.forEach((e, i) => {
  const btn = document.createElement('button');
  btn.className = 'emoji-opt' + (i === 0 ? ' selected' : '');
  btn.textContent = e;
  btn.onclick = () => {
    document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = e;
  };
  picker.appendChild(btn);
});

// タブ
window.switchTab = (tab, el) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
};

// 回答者モーダル
window.openModal = () => {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('player-name-input').value = '';
  document.getElementById('player-name-input').focus();
  selectedEmoji = EMOJIS[0];
  document.querySelectorAll('.emoji-opt').forEach((b, i) => b.classList.toggle('selected', i === 0));
};
window.closeModal = () => document.getElementById('modal-overlay').classList.remove('show');
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) window.closeModal(); });
document.getElementById('player-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.addPlayer(); });

// お題モーダル
window.openTopicModal = () => {
  document.getElementById('topic-modal-overlay').classList.add('show');
  document.getElementById('topic-input').value = currentTopic;
  document.getElementById('topic-input').focus();
};
window.closeTopicModal = () => document.getElementById('topic-modal-overlay').classList.remove('show');
document.getElementById('topic-modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) window.closeTopicModal(); });
document.getElementById('topic-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.saveTopic(); } });

window.saveTopic = () => {
  const topic = document.getElementById('topic-input').value.trim();
  set(topicRef, topic);
  window.closeTopicModal();
};

// 回答者追加・削除
window.addPlayer = () => {
  const name = document.getElementById('player-name-input').value.trim();
  if (!name) { document.getElementById('player-name-input').focus(); return; }
  push(playersRef, { name, emoji: selectedEmoji, score: 0 });
  window.closeModal();
};
window.deletePlayer = (key) => remove(ref(db, 'players/' + key));

// 投票
window.vote = (key, event) => {
  runTransaction(ref(db, `players/${key}/score`), cur => (cur || 0) + 1);

  // +1 アニメーション
  const plus = document.createElement('div');
  plus.className = 'float-plus';
  plus.textContent = '+1';
  plus.style.left = (event.clientX - 15) + 'px';
  plus.style.top  = (event.clientY - 10) + 'px';
  document.body.appendChild(plus);
  plus.addEventListener('animationend', () => plus.remove());

  // 「飲んでなくない？」読み上げ
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance('飲んでなくない？');
    utterance.lang   = 'ja-JP';
    utterance.pitch  = 1.6;
    utterance.rate   = 1.1;
    utterance.volume = 1.0;
    window.speechSynthesis.speak(utterance);
  }
};

// 次のお題へ
window.nextTopic = () => {
  const btn = document.getElementById('next-topic-btn');
  if (btn.dataset.confirm === '1') {
    const entries = Object.entries(players);
    if (entries.length > 0) {
      const snapshot = {};
      entries.forEach(([key, p]) => {
        snapshot[key] = { name: p.name, emoji: p.emoji, score: p.score || 0 };
      });
      push(historyRef, { topic: currentTopic || '（お題なし）', results: snapshot, timestamp: Date.now() });
    }
    entries.forEach(([key]) => set(ref(db, `players/${key}/score`), 0));
    set(topicRef, '');
    btn.textContent = '次のお題へ →';
    btn.dataset.confirm = '0';
    btn.classList.remove('confirm');
  } else {
    btn.textContent = '⚠️ もう一度押すと保存&リセット';
    btn.dataset.confirm = '1';
    btn.classList.add('confirm');
    setTimeout(() => {
      btn.textContent = '次のお題へ →';
      btn.dataset.confirm = '0';
      btn.classList.remove('confirm');
    }, 3000);
  }
};

// ===== 結果発表 =====
window.showResult = () => {
  // 全履歴から各プレイヤーの合計スコアを集計
  const totals = {}; // playerKey → { name, emoji, total }

  // まず現在の参加者をベースにする
  Object.entries(players).forEach(([key, p]) => {
    totals[key] = { name: p.name, emoji: p.emoji, total: p.score || 0 };
  });

  // 履歴のスコアを加算
  Object.values(history).forEach(h => {
    Object.entries(h.results || {}).forEach(([key, p]) => {
      if (totals[key]) {
        totals[key].total += p.score || 0;
      } else {
        // 履歴にはいるが今は削除されたプレイヤーも含める
        totals[key] = { name: p.name, emoji: p.emoji, total: p.score || 0 };
      }
    });
  });

  const sorted = Object.entries(totals).sort((a, b) => b[1].total - a[1].total);
  const topicCount = Object.keys(history).length;

  // サブタイトル
  document.getElementById('result-modal-sub').textContent =
    `${topicCount}お題 / 参加者${sorted.length}人の合計スコア`;

  // 優勝者ボックス
  const winnerBox = document.getElementById('result-winner-box');
  if (sorted.length > 0) {
    const [, w] = sorted[0];
    winnerBox.innerHTML = `
      <div class="result-winner">
        <div class="result-winner-emoji">${w.emoji}</div>
        <div class="result-winner-label">🥇 総合優勝</div>
        <div class="result-winner-name">${w.name}</div>
        <div class="result-winner-score">合計 ${w.total} 飲んでなくない？</div>
      </div>
    `;
  } else {
    winnerBox.innerHTML = '';
  }

  // 全員リスト（2位以下）
  const medalMap = ['🥇','🥈','🥉'];
  const list = document.getElementById('result-list');
  list.innerHTML = '';
  sorted.forEach(([, p], i) => {
    const row = document.createElement('div');
    const rowClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    row.className = `result-row ${rowClass}`;
    row.innerHTML = `
      <div class="result-rank">${medalMap[i] || (i + 1)}</div>
      <div class="result-emoji">${p.emoji}</div>
      <div class="result-name">${p.name}</div>
      <div class="result-pts">${p.total}<span class="result-pts-label"> pt</span></div>
    `;
    list.appendChild(row);
  });

  document.getElementById('result-modal-overlay').classList.add('show');
};

window.closeResult = () => {
  document.getElementById('result-modal-overlay').classList.remove('show');
};
document.getElementById('result-modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) window.closeResult();
});

// ===== 全リセット =====
window.fullReset = () => {
  const btn = document.getElementById('full-reset-btn');
  if (btn.dataset.confirm === '1') {
    // 全データ削除
    remove(playersRef);
    remove(historyRef);
    set(topicRef, '');
    btn.textContent = '🗑️ 全リセット（回答者・履歴すべて）';
    btn.dataset.confirm = '0';
    btn.classList.remove('confirm');
  } else {
    btn.textContent = '⚠️ もう一度押すと全データ削除';
    btn.dataset.confirm = '1';
    btn.classList.add('confirm');
    setTimeout(() => {
      btn.textContent = '🗑️ 全リセット（回答者・履歴すべて）';
      btn.dataset.confirm = '0';
      btn.classList.remove('confirm');
    }, 3000);
  }
};

// Firebase listeners
onValue(playersRef, snap => { players = snap.val() || {}; renderPlayers(); renderMobile(); });
onValue(topicRef,   snap => { currentTopic = snap.val() || ''; renderTopic(); renderMobileTopic(); });
onValue(historyRef, snap => { history = snap.val() || {}; renderHistory(); });

// Helpers
function getRankInfo(i) {
  const medals = ['🥇','🥈','🥉'];
  if (i === 0) return { label:'🥇', cls:'gold',   rowcls:'rank-1-row', badgecls:'rank-1' };
  if (i === 1) return { label:'🥈', cls:'silver', rowcls:'rank-2-row', badgecls:'rank-2' };
  if (i === 2) return { label:'🥉', cls:'bronze', rowcls:'rank-3-row', badgecls:'rank-3' };
  return { label: String(i + 1), cls:'', rowcls:'', badgecls:'rank-other' };
}

function avatarBg(emoji) {
  const colors = ['#1e1a00','#001e1a','#1a001e','#001a1e','#1e0010','#0d1e00'];
  let h = 0;
  for (const c of emoji) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return colors[h % colors.length];
}

// Render: お題
function renderTopic() {
  const el = document.getElementById('topic-display');
  if (currentTopic) {
    el.textContent = currentTopic;
    el.classList.remove('empty');
  } else {
    el.textContent = 'お題を設定してください';
    el.classList.add('empty');
  }
}

// Render: プレイヤー＆ランキング（全員表示）
function renderPlayers() {
  const entries  = Object.entries(players);
  const sorted   = [...entries].sort((a, b) => (b[1].score || 0) - (a[1].score || 0));
  const total    = entries.reduce((s, [, p]) => s + (p.score || 0), 0);
  const maxScore = sorted[0]?.[1]?.score || 1;

  document.getElementById('total-count').textContent = total;
  document.getElementById('total-votes-header').textContent = `総投票: ${total}`;

  const grid = document.getElementById('players-grid');

  if (entries.length === 0) {
    grid.innerHTML = '<div class="empty-state">＋ボタンから回答者を追加して大喜利をスタート！</div>';
    document.getElementById('ranking-list').innerHTML = '<div class="empty-state">まだ投票がありません</div>';
    return;
  }

  grid.querySelector('.empty-state')?.remove();
  const currentKeys = new Set(entries.map(([k]) => k));
  [...grid.querySelectorAll('.player-card')].forEach(card => {
    if (!currentKeys.has(card.dataset.key)) card.remove();
  });

  entries.forEach(([key, p]) => {
    const rank = sorted.findIndex(([k]) => k === key);
    const ri   = getRankInfo(rank);
    let card   = grid.querySelector(`[data-key="${key}"]`);

    if (!card) {
      card = document.createElement('div');
      card.className = 'player-card';
      card.dataset.key = key;
      card.id = 'card-' + key;
      card.innerHTML = `
        <button class="delete-player-btn" onclick="deletePlayer('${key}')" title="削除">✕</button>
        <div class="rank-badge ${ri.badgecls}" id="badge-${key}">${ri.label}</div>
        <div class="player-avatar" style="background:${avatarBg(p.emoji)}">${p.emoji}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-score" id="score-${key}">${p.score || 0}</div>
        <button class="vote-btn" onclick="vote('${key}', event)">🍺 飲んでなくない？</button>
      `;
      grid.appendChild(card);
    } else {
      const scoreEl = document.getElementById('score-' + key);
      const prev = parseInt(scoreEl.textContent || '0');
      const curr = p.score || 0;
      scoreEl.textContent = curr;
      const badge = document.getElementById('badge-' + key);
      if (badge) { badge.className = `rank-badge ${ri.badgecls}`; badge.textContent = ri.label; }
      if (curr > prev) {
        card.classList.remove('bumped');
        void card.offsetWidth;
        card.classList.add('bumped');
      }
    }
  });

  // ランキングリスト（全員）
  const rankList = document.getElementById('ranking-list');
  rankList.innerHTML = '';
  sorted.forEach(([key, p], i) => {
    const ri  = getRankInfo(i);
    const pct = maxScore > 0 ? ((p.score || 0) / maxScore * 100) : 0;
    const row = document.createElement('div');
    row.className = `ranking-row ${ri.rowcls}`;
    row.innerHTML = `
      <div class="ranking-num ${ri.cls}">${ri.label}</div>
      <div class="ranking-emoji">${p.emoji}</div>
      <div class="ranking-inner">
        <div class="ranking-name">${p.name}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="ranking-score">${p.score || 0}</div>
    `;
    rankList.appendChild(row);
  });
}

// Render: 履歴（全員表示）
function renderHistory() {
  const list = document.getElementById('history-list');
  const entries = Object.entries(history).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">「次のお題へ」を押すと<br>ここに結果が保存されます</div>';
    return;
  }

  list.innerHTML = '';
  entries.forEach(([, h], idx) => {
    const results = Object.entries(h.results || {})
      .sort((a, b) => (b[1].score || 0) - (a[1].score || 0));

    const medalMap = ['🥇','🥈','🥉'];
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <div class="history-header">
        <div class="history-topic">${h.topic}</div>
        <div class="history-num">お題 ${entries.length - idx}</div>
      </div>
      <div class="history-results">
        ${results.map(([, p], i) => `
          <div class="history-row">
            <div class="history-rank">${medalMap[i] || (i + 1)}</div>
            <div class="history-name">${p.emoji} ${p.name}</div>
            <div class="history-score">${p.score || 0}</div>
          </div>
        `).join('')}
      </div>
    `;
    list.appendChild(card);
  });
}
// ===== スマホ用 =====
const MOBILE_EMOJIS = ['😂','🤣','😎','🦊','🐸','🐧','🦁','🐯','🐻','🐼','🐨','🦄','🐙','🦋','🍣','🍜','🍕','🎭','🎪','🎯','⚡','🌟','💥','🔥','🎲','🤖'];
let myPlayerKey = null;
let mobileSelectedEmoji = MOBILE_EMOJIS[0];

// URLパラメータでモード判定
// ?mode=vote → 観客モード（登録不要・全員に投票ボタン）
// デフォルト  → 回答者モード（名前登録あり）
const urlParams = new URLSearchParams(window.location.search);
const isAudienceMode = urlParams.get('mode') === 'vote';

// スマホ絵文字ピッカー初期化
const mobilePicker = document.getElementById('mobile-emoji-picker');
if (mobilePicker) {
  MOBILE_EMOJIS.forEach((e, i) => {
    const btn = document.createElement('button');
    btn.className = 'mobile-emoji-opt' + (i === 0 ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      document.querySelectorAll('.mobile-emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      mobileSelectedEmoji = e;
    };
    mobilePicker.appendChild(btn);
  });
}

// 常に参加登録画面を表示（スキップボタンで投票のみも可能）
document.getElementById('mobile-join-screen').style.display = 'flex';

// 登録せずスキップ（観客として投票のみ）
window.mobileSkip = () => {
  document.getElementById('mobile-join-screen').style.display = 'none';
  document.getElementById('mobile-vote-screen').style.display = 'flex';
  renderMobile();
};

// 参加する（回答者モードのみ）
window.mobileJoin = () => {
  const name = document.getElementById('mobile-name-input')?.value.trim();
  if (!name) { document.getElementById('mobile-name-input')?.focus(); return; }

  const newRef = push(playersRef, { name, emoji: mobileSelectedEmoji, score: 0 });
  myPlayerKey = newRef.key;
  sessionStorage.setItem('myPlayerKey', myPlayerKey);

  document.getElementById('mobile-join-screen').style.display = 'none';
  const voteScreen = document.getElementById('mobile-vote-screen');
  voteScreen.style.display = 'flex';
  renderMobile();
};

// セッション復元（ページ再読み込み対応・回答者モードのみ）
if (!isAudienceMode) {
  const savedKey = sessionStorage.getItem('myPlayerKey');
  if (savedKey) {
    myPlayerKey = savedKey;
    onValue(ref(db, `players/${savedKey}`), snap => {
      if (snap.val()) {
        document.getElementById('mobile-join-screen').style.display = 'none';
        document.getElementById('mobile-vote-screen').style.display = 'flex';
      } else {
        myPlayerKey = null;
        sessionStorage.removeItem('myPlayerKey');
      }
    }, { onlyOnce: true });
  }
}

function renderMobileTopic() {
  const el = document.getElementById('mobile-topic-text');
  if (!el) return;
  if (currentTopic) {
    el.textContent = currentTopic;
    el.classList.remove('empty');
  } else {
    el.textContent = 'お題を設定してください';
    el.classList.add('empty');
  }
}

function renderMobile() {
  const container = document.getElementById('mobile-players');
  if (!container) return;

  const entries = Object.entries(players);
  const total   = entries.reduce((s, [, p]) => s + (p.score || 0), 0);
  const mTotal  = document.getElementById('mobile-total');
  if (mTotal) mTotal.textContent = `総投票: ${total}`;

  container.innerHTML = '';

  if (entries.length === 0) {
    container.innerHTML = '<div class="mobile-empty">参加者を待っています...</div>';
    return;
  }

  entries.forEach(([key, p]) => {
    const isMe = key === myPlayerKey;
    const card = document.createElement('div');
    card.className = 'mobile-player-card' + (isMe ? ' mobile-is-me' : '');
    card.innerHTML = `
      <div class="mobile-avatar" style="background:${avatarBg(p.emoji)}">${p.emoji}</div>
      <div class="mobile-player-info">
        <div class="mobile-player-name">${p.name}${isMe ? ' <span style="color:var(--accent);font-size:0.75rem">（あなた）</span>' : ''}</div>
        <div class="mobile-player-score">${p.score || 0} 飲んでなくない？</div>
      </div>
      <button class="mobile-vote-btn" onclick="vote('${key}', event)">🍺 飲んでなくない？</button>
    `;
    container.appendChild(card);
  });
}

// スマホの接続ステータス同期
onValue(ref(db, '.info/connected'), snap => {
  const online = snap.val();
  const dot   = document.getElementById('mobile-conn-dot');
  const label = document.getElementById('mobile-conn-label');
  if (dot)   dot.className    = 'conn-dot ' + (online ? 'online' : 'offline');
  if (label) label.textContent = online ? 'リアルタイム同期中' : 'オフライン';
});
</script>
